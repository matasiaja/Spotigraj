<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zgłoś się do testów Premium — Spotigraj</title>
<style>
  :root {
    --bg: #0a0a12;
    --card: #12121f;
    --gold: #f3b000;
    --text: #f5f5f7;
    --text-dim: #a0a0b0;
    --border: #232336;
    --error: #ef4444;
    --success: #22c55e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  .wrap {
    max-width: 560px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }
  h1 {
    font-size: 1.5rem;
    margin-bottom: 4px;
  }
  .subtitle {
    color: var(--text-dim);
    margin-bottom: 24px;
    font-size: 0.95rem;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
  }
  label {
    display: block;
    font-size: 0.9rem;
    color: var(--text-dim);
    margin: 16px 0 6px;
  }
  label:first-of-type { margin-top: 0; }
  input, textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 1rem;
    font-family: inherit;
  }
  textarea {
    resize: vertical;
    min-height: 90px;
  }
  input:focus, textarea:focus {
    outline: none;
    border-color: var(--gold);
  }
  .required { color: var(--gold); }
  button {
    margin-top: 22px;
    width: 100%;
    background: var(--gold);
    color: #1a1306;
    font-weight: 700;
    font-size: 1rem;
    border: none;
    border-radius: 12px;
    padding: 15px;
    cursor: pointer;
  }
  button:disabled {
    opacity: 0.6;
    cursor: default;
  }
  .msg {
    margin-top: 16px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 0.9rem;
    display: none;
  }
  .msg.error {
    background: rgba(239,68,68,0.12);
    color: var(--error);
    display: block;
  }
  .msg.success {
    background: rgba(34,197,94,0.12);
    color: var(--success);
    display: block;
  }
  .back-link {
    display: block;
    margin-top: 24px;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 0.9rem;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="wrap">
    <h1>🎁 Zgłoś się do testów Premium</h1>
    <p class="subtitle">Wypełnij formularz — odpiszemy mailem z kodem aktywacyjnym.</p>

    <div class="card">
      <form id="signupForm">
        <label for="name">Imię <span class="required">*</span></label>
        <input type="text" id="name" required maxlength="150">

        <label for="email">E-mail <span class="required">*</span></label>
        <input type="email" id="email" required maxlength="200">

        <label for="profileLink">Link do Twojego profilu w Spotigraj</label>
        <input type="text" id="profileLink" maxlength="500" placeholder="np. link który możesz skopiować z profilu w appce">

        <label for="reason">Dlaczego chcesz testować Premium?</label>
        <textarea id="reason" maxlength="2000"></textarea>

        <button type="submit" id="submitBtn">Wyślij zgłoszenie</button>
        <div class="msg" id="msgBox"></div>
      </form>
    </div>

    <a class="back-link" href="warunki-testow-premium.html">← Wróć do warunków</a>
  </div>

<script>
const SUPABASE_FUNCTION_URL = "https://xjwbofgfdwivomvlppfm.supabase.co/functions/v1/send-premium-signup";
const SUPABASE_ANON_KEY = "sb_publishable__yBtwe_DMyYk8ZvuxtAhIw_WNr3zXIS";

const form = document.getElementById("signupForm");
const submitBtn = document.getElementById("submitBtn");
const msgBox = document.getElementById("msgBox");

function showMsg(text, type) {
  msgBox.textContent = text;
  msgBox.className = "msg " + type;
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  msgBox.className = "msg";

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const profileLink = document.getElementById("profileLink").value.trim();
  const reason = document.getElementById("reason").value.trim();

  if (!name || !email) {
    showMsg("Imię i e-mail są wymagane.", "error");
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = "Wysyłanie...";

  try {
    const resp = await fetch(SUPABASE_FUNCTION_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": "Bearer " + SUPABASE_ANON_KEY,
      },
      body: JSON.stringify({ name, email, profileLink, reason }),
    });

    const data = await resp.json();

    if (resp.ok && data.success) {
      showMsg("Dzięki! Zgłoszenie wysłane — odpiszemy mailem.", "success");
      form.reset();
      submitBtn.textContent = "Wysłano ✓";
    } else {
      showMsg(data.error || "Coś poszło nie tak. Spróbuj ponownie.", "error");
      submitBtn.disabled = false;
      submitBtn.textContent = "Wyślij zgłoszenie";
    }
  } catch (err) {
    showMsg("Błąd połączenia. Spróbuj ponownie.", "error");
    submitBtn.disabled = false;
    submitBtn.textContent = "Wyślij zgłoszenie";
  }
});
</script>
</body>
</html>
